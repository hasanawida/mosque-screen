name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: فحص صياغة كل ملفات JavaScript
        run: |
          for f in js/*.js sw.js tests/*.js; do
            node --check "$f"
            echo "OK: $f"
          done

      - name: اختبارات محرك مواقيت الصلاة
        run: node tests/praytimes.test.js
